# nfpm configuration for plik-server
# https://nfpm.goreleaser.com/configuration/
#
# Build with:
#   nfpm pkg --config releaser/nfpm-server.yaml --packager deb --target releases/

name: plik-server
arch: "${DEB_ARCH}"
platform: linux
version: "${VERSION}"
section: web
priority: optional
maintainer: "Mathieu Bodjikian <mathieu@bodjikian.fr>"
description: |
  Plik server - Temporary file upload system.
  Self-hosted file sharing platform with multi-backend support,
  web interface, CLI client, and optional authentication.
vendor: root-gg
homepage: https://github.com/root-gg/plik
license: MIT

depends:
  - ca-certificates

contents:
  # Server binary
  - src: release/server/plikd
    dst: /usr/bin/plikd
    file_info:
      mode: 0755

  # Configuration file (preserved on upgrade)
  - src: release/server/plikd.cfg
    dst: /etc/plik/plikd.cfg
    type: config|noreplace
    file_info:
      mode: 0640
      owner: root
      group: plik

  # Systemd service
  - src: releaser/plikd.service
    dst: /usr/lib/systemd/system/plikd.service
    file_info:
      mode: 0644

  # Webapp static files
  - src: release/webapp/dist
    dst: /usr/share/plik/webapp/dist
    type: tree

  # Client binaries
  - src: release/clients
    dst: /usr/share/plik/clients
    type: tree

  # Changelog
  - src: release/changelog
    dst: /usr/share/plik/changelog
    type: tree

  # Create data directory
  - dst: /var/lib/plik
    type: dir
    file_info:
      mode: 0750
      owner: plik
      group: plik

  # Create data/files directory (default DataBackend directory)
  - dst: /var/lib/plik/files
    type: dir
    file_info:
      mode: 0750
      owner: plik
      group: plik

overrides:
  deb:
    conflicts:
      - plik-server

scripts:
  postinstall: releaser/scripts/server-postinstall.sh
  preremove: releaser/scripts/server-preremove.sh
  postremove: releaser/scripts/server-postremove.sh
