# Default values for plik.
# This is a YAML-formatted file.
# Declare variables to be passed into your templates.

replicaCount: 1

image:
  repository: rootgg/plik
  pullPolicy: IfNotPresent
  # Overrides the image tag whose default is the chart appVersion.
  tag: ""

imagePullSecrets: []
nameOverride: ""
fullnameOverride: ""

serviceAccount:
  # Specifies whether a service account should be created
  create: false
  # Annotations to add to the service account
  annotations: {}
  # The name of the service account to use.
  # If not set and create is true, a name is generated using the fullname template
  name: ""

podAnnotations: {}

podSecurityContext: {}
  # fsGroup: 2000

securityContext: {}
  # capabilities:
  #   drop:
  #   - ALL
  # readOnlyRootFilesystem: true
  # runAsNonRoot: true
  # runAsUser: 1000

service:
  type: ClusterIP
  port: 8080
  annotations: {}

ingress:
  enabled: false
  className: ""
  annotations: {}
    # kubernetes.io/ingress.class: nginx
    # kubernetes.io/tls-acme: "true"
  hosts:
    - host: chart-example.local
      paths:
        - path: /
          pathType: ImplementationSpecific
  tls: []
  #  - secretName: chart-example-tls
  #    hosts:
  #      - chart-example.local

resources: {}
  # We usually recommend not to specify default resources and to leave this as a conscious
  # choice for the user. This also increases chances charts run on environments with little
  # resources, such as Minikube. If you do want to specify resources, uncomment the following
  # lines, adjust them as necessary, and remove the curly braces after 'resources'.
  # limits:
  #   cpu: 100m
  #   memory: 128Mi
  # requests:
  #   cpu: 100m
  #   memory: 128Mi

autoscaling:
  enabled: false
  minReplicas: 1
  maxReplicas: 100
  targetCPUUtilizationPercentage: 80
  # targetMemoryUtilizationPercentage: 80

nodeSelector: {}

tolerations: []

affinity: {}

# Plik specific configuration
# This section mirrors the plikd.cfg configuration file

# Deployment Strategy
# Can be 'Deployment' or 'StatefulSet'.
# Use StatefulSet if you are using 'file' backend with a PersistentVolume.
kind: Deployment

persistence:
  enabled: false
  # storageClassName: default
  accessModes:
    - ReadWriteOnce
  size: 10Gi
  # annotations: {}
  path: /home/plik/server/files

dbPersistence:
  enabled: false
  # storageClassName: default
  accessModes:
    - ReadWriteOnce
  size: 1Gi
  # annotations: {}
  path: /home/plik/server/db

plikd:
  Debug: false
  DebugRequests: false
  LogLevel: "INFO"

  ListenPort: 8080
  ListenAddress: "0.0.0.0"
  MetricsPort: 0
  MetricsAddress: "0.0.0.0"
  Path: ""
  SslEnabled: false
  SslCert: "plik.crt"
  SslKey: "plik.key"
  TlsVersion: "tlsv10"
  NoWebInterface: false
  DownloadDomain: ""
  DownloadDomainAlias: []
  EnhancedWebSecurity: false
  SessionTimeout: "365d"
  AbuseContact: ""
  WebappDirectory: "../webapp/dist"
  ClientsDirectory: "../clients"
  ChangelogDirectory: "../changelog"
  SourceIpHeader: ""
  UploadWhitelist: []

  MaxFileSizeStr: "10GB"
  MaxUserSizeStr: "unlimited"
  MaxFilePerUpload: 1000

  DefaultTTLStr: "30d"
  MaxTTLStr: "30d"

  FeatureAuthentication: "disabled"
  FeatureLocalLogin: "enabled"
  FeatureDeleteAccount: "enabled"
  FeatureOneShot: "enabled"
  FeatureRemovable: "enabled"
  FeatureStream: "enabled"
  FeaturePassword: "enabled"
  FeatureComments: "enabled"
  FeatureSetTTL: "enabled"
  FeatureExtendTTL: "disabled"
  FeatureClients: "enabled"
  FeatureGithub: "enabled"
  FeatureText: "enabled"

  # Google config (non-sensitive — client ID and domain list only)
  GoogleApiClientID: ""
  GoogleValidDomains: []

  # OVH config (non-sensitive — public endpoint only)
  OvhApiEndpoint: ""

  # OIDC config (non-sensitive — client ID, provider URL, domains)
  OIDCClientID: ""
  OIDCProviderURL: ""
  OIDCProviderName: "OpenID"
  OIDCValidDomains: []
  OIDCRequireVerifiedEmail: false

  DataBackend: "file"
  DataBackendConfig:
    Directory: "files"
    # GCS
    # Bucket: "MyAwesomeBucket"
    # Folder: "plik"
    # Swift
    # Container: "plik"
    # AuthUrl: "https://auth.swiftauthapi.xxx/v2.0/"
    # UserName: "user@tld.net"
    # Domain: "domain"
    # Tenant: "tenant"
    # S3
    # Endpoint: "127.0.0.1:9000"
    # AccessKeyID: "access_key_id"
    # Bucket: "plik"
    # Location: "us-east-1"
    # Prefix: ""
    # UseSSL: true
    # PartSize: 16777216
    # SSE: ""

  MetadataBackendConfig:
    Driver: "sqlite3"
    ConnectionString: "/home/plik/server/db/plik.db"
    Debug: false

# ─── Sensitive Credentials ────────────────────────────────────────────────────
# All secret values are stored in a Kubernetes Secret, never in a ConfigMap.
# The application reads these values from environment variables at startup.
#
# To use a pre-existing Secret (e.g. managed by Vault, Sealed Secrets, ESO):
#   secrets.existingSecret: "my-plik-secret"
# The external secret must expose the same env var keys listed below.
secrets:
  # If set, the chart will NOT create a Secret resource and will reference this
  # existing Secret instead. The Secret must contain the relevant env var keys.
  existingSecret: ""

  # Google OAuth2 — client secret injected as PLIKD_GOOGLE_API_SECRET
  googleApiSecret: ""

  # OVH OAuth2 — injected as PLIKD_OVH_API_KEY / PLIKD_OVH_API_SECRET
  ovhApiKey: ""
  ovhApiSecret: ""

  # OIDC — client secret injected as PLIKD_OIDC_CLIENT_SECRET
  oidcClientSecret: ""

  # Data backend sensitive config (e.g. S3 SecretAccessKey, Swift ApiKey).
  # Injected as PLIKD_DATA_BACKEND_CONFIG (JSON).
  # Keys defined here are merged with non-sensitive DataBackendConfig at runtime.
  dataBackend: {}
  #   SecretAccessKey: ""
  #   ApiKey: ""

  # Metadata backend sensitive config (e.g. database Password).
  # Injected as PLIKD_METADATA_BACKEND_CONFIG (JSON).
  metadataBackend: {}
  #   Password: ""
