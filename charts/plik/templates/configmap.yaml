apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "plik.fullname" . }}
  labels:
    {{- include "plik.labels" . | nindent 4 }}
data:
  plikd.cfg: |
    # Generated by Helm

    Debug               = {{ .Values.plikd.Debug }}
    DebugRequests       = {{ .Values.plikd.DebugRequests }}
    LogLevel            = {{ .Values.plikd.LogLevel | quote }}

    ListenPort          = {{ .Values.plikd.ListenPort }}
    ListenAddress       = {{ .Values.plikd.ListenAddress | quote }}
    MetricsPort         = {{ .Values.plikd.MetricsPort }}
    MetricsAddress      = {{ .Values.plikd.MetricsAddress | quote }}
    Path                = {{ .Values.plikd.Path | quote }}
    SslEnabled          = {{ .Values.plikd.SslEnabled }}
    SslCert             = {{ .Values.plikd.SslCert | quote }}
    SslKey              = {{ .Values.plikd.SslKey | quote }}
    TlsVersion          = {{ .Values.plikd.TlsVersion | quote }}
    NoWebInterface      = {{ .Values.plikd.NoWebInterface }}
    DownloadDomain      = {{ .Values.plikd.DownloadDomain | quote }}
    DownloadDomainAlias = {{ .Values.plikd.DownloadDomainAlias | toJson }}
    EnhancedWebSecurity = {{ .Values.plikd.EnhancedWebSecurity }}
    SessionTimeout      = {{ .Values.plikd.SessionTimeout | quote }}
    AbuseContact        = {{ .Values.plikd.AbuseContact | quote }}
    WebappDirectory     = {{ .Values.plikd.WebappDirectory | quote }}
    ClientsDirectory    = {{ .Values.plikd.ClientsDirectory | quote }}
    ChangelogDirectory  = {{ .Values.plikd.ChangelogDirectory | quote }}
    SourceIpHeader      = {{ .Values.plikd.SourceIpHeader | quote }}
    UploadWhitelist     = {{ .Values.plikd.UploadWhitelist | toJson }}

    MaxFileSizeStr      = {{ .Values.plikd.MaxFileSizeStr | quote }}
    MaxUserSizeStr      = {{ .Values.plikd.MaxUserSizeStr | quote }}
    MaxFilePerUpload    = {{ .Values.plikd.MaxFilePerUpload }}

    DefaultTTLStr       = {{ .Values.plikd.DefaultTTLStr | quote }}
    MaxTTLStr           = {{ .Values.plikd.MaxTTLStr | quote }}

    FeatureAuthentication = {{ .Values.plikd.FeatureAuthentication | quote }}
    FeatureLocalLogin     = {{ .Values.plikd.FeatureLocalLogin | quote }}
    FeatureDeleteAccount  = {{ .Values.plikd.FeatureDeleteAccount | quote }}
    FeatureOneShot        = {{ .Values.plikd.FeatureOneShot | quote }}
    FeatureRemovable      = {{ .Values.plikd.FeatureRemovable | quote }}
    FeatureStream         = {{ .Values.plikd.FeatureStream | quote }}
    FeaturePassword       = {{ .Values.plikd.FeaturePassword | quote }}
    FeatureComments       = {{ .Values.plikd.FeatureComments | quote }}
    FeatureSetTTL         = {{ .Values.plikd.FeatureSetTTL | quote }}
    FeatureExtendTTL      = {{ .Values.plikd.FeatureExtendTTL | quote }}
    FeatureClients        = {{ .Values.plikd.FeatureClients | quote }}
    FeatureGithub         = {{ .Values.plikd.FeatureGithub | quote }}
    FeatureText           = {{ .Values.plikd.FeatureText | quote }}

    GoogleApiClientID   = {{ .Values.plikd.GoogleApiClientID | quote }}
    GoogleValidDomains  = {{ .Values.plikd.GoogleValidDomains | toJson }}
    OvhApiEndpoint      = {{ .Values.plikd.OvhApiEndpoint | quote }}
    OIDCClientID        = {{ .Values.plikd.OIDCClientID | quote }}
    OIDCProviderURL     = {{ .Values.plikd.OIDCProviderURL | quote }}
    OIDCProviderName    = {{ .Values.plikd.OIDCProviderName | quote }}
    OIDCValidDomains    = {{ .Values.plikd.OIDCValidDomains | toJson }}
    OIDCRequireVerifiedEmail = {{ .Values.plikd.OIDCRequireVerifiedEmail }}

    DataBackend = {{ .Values.plikd.DataBackend | quote }}

    [DataBackendConfig]
    {{- range $key, $val := .Values.plikd.DataBackendConfig }}
    {{ $key }} = {{ $val | toJson }}
    {{- end }}

    [MetadataBackendConfig]
    {{- range $key, $val := .Values.plikd.MetadataBackendConfig }}
    {{ $key }} = {{ $val | toJson }}
    {{- end }}
