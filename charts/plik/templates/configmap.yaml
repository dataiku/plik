apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "plik.fullname" . }}
  labels:
    {{- include "plik.labels" . | nindent 4 }}
data:
  plikd.cfg: |
    # Generated by Helm
    
    {{- $sensitiveKeys := list "GoogleApiSecret" "OvhApiSecret" "OIDCClientSecret" "DataBackendConfig" "MetadataBackendConfig" }}
    {{- range $key, $val := .Values.plikd }}
    {{- if not (has $key $sensitiveKeys) }}
    {{ $key }} = {{ $val | toJson }}
    {{- end }}
    {{- end }}

    [DataBackendConfig]
    {{- $dataSensitiveKeys := list "SecretAccessKey" "ApiKey" }}
    {{- range $key, $val := .Values.plikd.DataBackendConfig }}
    {{- if not (has $key $dataSensitiveKeys) }}
    {{ $key }} = {{ $val | toJson }}
    {{- end }}
    {{- end }}

    [MetadataBackendConfig]
    {{- $metadataSensitiveKeys := list "Password" }} 
    {{- range $key, $val := .Values.plikd.MetadataBackendConfig }}
    {{- if not (has $key $metadataSensitiveKeys) }}
    {{ $key }} = {{ $val | toJson }}
    {{- end }}
    {{- end }}
