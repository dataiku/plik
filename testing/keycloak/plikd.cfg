#####
##
#  Plik - Configuration File for Keycloak OIDC Testing
#

Debug               = true
DebugRequests       = true
ListenPort          = 8080
ListenAddress       = "0.0.0.0"

# OIDC Configuration
FeatureAuthentication = "forced"

OIDCClientID        = "plik"
OIDCClientSecret    = "plik-secret"
OIDCProviderURL     = "http://localhost:2607/realms/plik"
OIDCProviderName    = "Keycloak"
# OIDCValidDomains    = ["example.com"]  # Uncomment to restrict by email domain
# OIDCRequireVerifiedEmail = false       # Reject login when email_verified is not true or absent

# Local login is disabled since we're testing OIDC
DisableLocalLogin   = true

# Data backend
DataBackend = "file"
[DataBackendConfig]
    Directory = "files"

# Metadata backend
[MetadataBackendConfig]
    Driver = "sqlite3"
    ConnectionString = "plik.db"
    Debug = false
