name: release

on:
  workflow_dispatch:
  release:
    types: [created]

jobs:
  build:
    name: build_to_release
    runs-on: ubuntu-latest
    steps:
    - name: Check out code into the Go module directory
      uses: actions/checkout@v3

    - name: Fetch tags
      run: |
        git fetch --prune --unshallow --tags

    - name: Configure Git
      run: |
        git config user.name "$GITHUB_ACTOR"
        git config user.email "$GITHUB_ACTOR@users.noreply.github.com"

    - name: Login to Docker Hub
      uses: docker/login-action@v2
      with:
        username: ${{ secrets.DOCKERHUB_USERNAME }}
        password: ${{ secrets.DOCKERHUB_TOKEN }}

    - name: Branch name
      id: branch_name
      run: |
        echo ::set-output name=SOURCE_NAME::${GITHUB_REF#refs/*/}
        echo ::set-output name=SOURCE_BRANCH::${GITHUB_REF#refs/heads/}
        echo ::set-output name=SOURCE_TAG::${GITHUB_REF#refs/tags/}

    - name: Set up Docker Buildx
      id: buildx
      uses: docker/setup-buildx-action@v2

    - name: Make plik release
      run: make release-and-push-to-docker-hub

    - name: Install Helm
      if: github.event_name == 'release'
      uses: azure/setup-helm@v4

    - name: Package and publish Helm chart
      if: github.event_name == 'release'
      run: releaser/helm_release.sh ${GITHUB_REF#refs/tags/}

    - name: Set up Go
      if: github.event_name == 'release'
      uses: actions/setup-go@v5
      with:
        go-version: stable

    - name: Install nfpm
      if: github.event_name == 'release'
      run: |
        go install github.com/goreleaser/nfpm/v2/cmd/nfpm@latest
        echo "$(go env GOPATH)/bin" >> $GITHUB_PATH

    - name: Install APT repo tools
      if: github.event_name == 'release'
      run: |
        sudo apt-get update
        sudo apt-get install -y dpkg-dev apt-utils gnupg

    - name: Build Debian packages and update APT repository
      if: github.event_name == 'release'
      env:
        GPG_PRIVATE_KEY: ${{ secrets.GPG_PRIVATE_KEY }}
        GPG_PASSPHRASE: ${{ secrets.GPG_PASSPHRASE }}
      run: releaser/apt_release.sh ${GITHUB_REF#refs/tags/}

    - name: Upload artifacts to release
      uses: softprops/action-gh-release@v1
      with:
        files: releases/*
