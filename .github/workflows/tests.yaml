name: test

on: [pull_request]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:

    - name: Check out code into the Go module directory
      uses: actions/checkout@v4

    - name: Set up Go
      uses: actions/setup-go@v5
      with:
        go-version-file: 'go.mod'

    - name: Fetch tags
      run: git fetch --prune --unshallow --tags

    - name: Run linter
      run: make lint

    - name: Install age
      run: sudo apt-get install -y age

    - name: Run tests
      run: make test

    - name: Check for uncommitted changes
      run: |
        git diff --exit-code || { echo "::error::Uncommitted changes detected"; git status; exit 1; }
        UNTRACKED=$(git ls-files --others --exclude-standard)
        if [ -n "$UNTRACKED" ]; then echo "::error::Untracked files detected:"; git status; exit 1; fi

    - name: Install govulncheck
      run: go install golang.org/x/vuln/cmd/govulncheck@latest

    - name: Run vulnerability check (report only)
      run: make vuln || true

  test-frontend:
    runs-on: ubuntu-latest
    steps:

    - name: Check out code
      uses: actions/checkout@v4

    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: 24
        cache: npm
        cache-dependency-path: webapp/package-lock.json

    - name: Run frontend tests
      run: make test-frontend

  test-frontend-e2e:
    runs-on: ubuntu-latest
    steps:

    - name: Check out code
      uses: actions/checkout@v4

    - name: Set up Go
      uses: actions/setup-go@v5
      with:
        go-version-file: 'go.mod'

    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: 24
        cache: npm
        cache-dependency-path: webapp/package-lock.json

    - name: Fetch tags
      run: git fetch --prune --unshallow --tags

    - name: Run e2e tests
      run: make test-frontend-e2e
      env:
        CI: "true"

    - name: Upload test artifacts
      if: failure()
      uses: actions/upload-artifact@v4
      with:
        name: playwright-report
        path: webapp/test-results/
        retention-days: 7

  test-backends:
    runs-on: ubuntu-latest
    steps:

    - name: Check out code into the Go module directory
      uses: actions/checkout@v4

    - name: Set up Go
      uses: actions/setup-go@v5
      with:
        go-version-file: 'go.mod'

    - name: Fetch tags
      run: git fetch --prune --unshallow --tags

    - name: Run backend tests
      run: make test-backends

    - name: Check for uncommitted changes
      run: |
        git diff --exit-code || { echo "::error::Uncommitted changes detected"; git status; exit 1; }
        UNTRACKED=$(git ls-files --others --exclude-standard)
        if [ -n "$UNTRACKED" ]; then echo "::error::Untracked files detected:"; git status; exit 1; fi

  release:
    runs-on: ubuntu-latest
    steps:

    - name: Check out code into the Go module directory
      uses: actions/checkout@v4

    - name: Set up Go
      uses: actions/setup-go@v5
      with:
        go-version-file: 'go.mod'

    - name: Fetch tags
      run: git fetch --prune --unshallow --tags

    - name: Set up Docker Buildx
      id: buildx
      uses: docker/setup-buildx-action@v2

    - name: Run release
      run: make release

  docs:
    runs-on: ubuntu-latest
    steps:

    - name: Check out code into the Go module directory
      uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: 24
        cache: npm
        cache-dependency-path: docs/package-lock.json

    - name: Build docs
      run: make docs

  helm-docs:
    runs-on: ubuntu-latest
    steps:

    - name: Check out code
      uses: actions/checkout@v4

    - name: Set up Go
      uses: actions/setup-go@v5
      with:
        go-version-file: 'go.mod'

    - name: Install helm-docs
      run: go install github.com/norwoodj/helm-docs/cmd/helm-docs@latest

    - name: Run helm-docs
      run: make helm-docs

    - name: Check for uncommitted changes
      run: |
        git diff --exit-code || { echo "::error::Uncommitted changes detected after running helm-docs. Run 'make helm-docs' and commit the result."; git status; exit 1; }
        UNTRACKED=$(git ls-files --others --exclude-standard)
        if [ -n "$UNTRACKED" ]; then echo "::error::Untracked files detected after running helm-docs."; git status; exit 1; fi